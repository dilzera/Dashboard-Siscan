services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SESSION_SECRET=${SESSION_SECRET}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - NEUSA_PASSWORD=${NEUSA_PASSWORD:-}
      - SECRETARIA_PASSWORD=${SECRETARIA_PASSWORD:-}
      - ROCHE_PASSWORD=${ROCHE_PASSWORD:-}
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=siscan
      - POSTGRES_USER=siscan_user
      - POSTGRES_PASSWORD=siscan_pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
